name: Daily Active ETF Tracker

on:
  schedule:
    - cron: '30 9 * * *' # 台北時間 17:30
  workflow_dispatch: # 這行會讓按鈕出現

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install pandas requests
      - run: python etf_tracker.py
      - name: Commit data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_data.csv
          git commit -m "update data" || exit 0
          git push
